<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElektroInfo - Przekierowanie</title>
    <style>
        /* Reset i tło */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Czerwony pasek na górze */
        .top-banner {
            background-color: #ff0000; /* Czysty czerwony */
            color: white;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            position: fixed;
            top: 0;
            left: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        /* Kontener na środku */
        .container {
            text-align: center;
        }

        /* Styl przycisku na środku */
        .main-button {
            display: inline-block;
            background-color: #ff0000;
            color: white;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .main-button:hover {
            background-color: #cc0000;
            transform: scale(1.05);
        }

        .main-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="top-banner">
        Uwaga Ta Strona Została Zamknięta naciśnij ten przycisk
    </div>

    <div class="container">
        <a href="https://franekzz.github.io/Gorace-Mamuski/" class="main-button">
            Otwórz Naszą nową stronę
        </a>
    </div>

</body>
</html>
